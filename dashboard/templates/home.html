<!DOCTYPE html>

{% load static %}

<html>

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>

    <script>
        function redirect(goto) {
            if (goto != '') {
                window.location = goto;
            }
        }
    </script>
    <style>
        :root {
            --bg: #f3f5f8;
            --card: #ffffff;
            --ink: #16212f;
            --muted: #5b6b7f;
            --accent: #0f7aa7;
            --accent-2: #1d3f72;
            --line: #d6dce5;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background: radial-gradient(circle at top right, #d7edf5, #f3f5f8 45%);
            color: var(--ink);
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
        }

        .banner {
            background: linear-gradient(115deg, var(--accent-2), var(--accent));
            color: #fff;
            padding: 28px 34px;
            box-shadow: 0 6px 18px rgba(16, 42, 79, 0.24);
        }

        .banner h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.02em;
        }

        .banner p {
            margin: 6px 0 0;
            opacity: 0.9;
        }

        .page {
            max-width: 1300px;
            margin: 24px auto;
            padding: 0 20px 36px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .metric {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 14px;
            background: var(--card);
            font-weight: 600;
        }

        .module-subtitle {
            margin: 18px 0 10px;
            color: var(--muted);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .full-width-iframe {
            width: 100%;
            height: 500px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            margin-bottom: 20px;
        }

        .wrapper {
            display: flex;
            padding: 4px;
            background-color: #d4dce7;
            border-radius: 8px;
            width: fit-content;
        }

        .custom-input {
            flex-grow: 1;
        }

        .custom-input input[type=radio] {
            display: none;
        }

        .custom-input label {
            display: block;
            padding: 6px 8px;
            color: #2f3f54;
            font-weight: bold;
            text-align: center;
            transition: all .4s 0s ease;
        }

        .custom-input input[type=radio]:checked+label {
            background-color: #fff;
            color: #102748;
            border-radius: 4px;
        }
    </style>

</head>

<body>
    <header class="banner">
        <h1>ReVSeq Dashboard</h1>
        <p>Respiratory virus surveillance in Switzerland</p>
    </header>
    <main class="page">
        <h2>Infections in Switzerland</h2>

        <div class="controls">
            <select name="strain" id="strain">
                <option value="" selected>Select strain</option>
                {% for option in strain_options %}
                <option value="{{ option.value }}">{{ option.label }}</option>
                {% endfor %}
            </select>
            <div class="metric">Total no. of samples: {{no_samples}}</div>
        </div>

    <script>
        var selectStrain = document.getElementById('strain');

        selectStrain.onchange = function () {
            var goto = this.value;
            redirect(goto);

        };
    </script>

    <div class="container">
        <h3 class="module-subtitle">Sequencing counts</h3>
        <iframe class="full-width-iframe" src="{% static 'barplot_seq.html' %}?v={{ asset_version }}"></iframe>
        <h3 class="module-subtitle">PCR counts</h3>
        <iframe class="full-width-iframe" src="{% static 'barplot_pcr.html' %}?v={{ asset_version }}"></iframe>
        <h3 class="module-subtitle">Map</h3>
        <div class="wrapper">
            <div class="custom-input">
                <input type="radio" id="home_map_seq" name="home_map_source"
                    onclick="document.getElementById('home_map_frame').src = '/static/map_seq.html?v={{ asset_version }}';"
                    {% if default_map == "seq" %}checked{% endif %}>
                <label for="home_map_seq">Sequencing</label>
            </div>
            <div class="custom-input">
                <input type="radio" id="home_map_pcr" name="home_map_source"
                    onclick="document.getElementById('home_map_frame').src = '/static/map_pcr.html?v={{ asset_version }}';"
                    {% if default_map == "pcr" %}checked{% endif %}>
                <label for="home_map_pcr">PCR</label>
            </div>
        </div>
        <iframe id="home_map_frame" class="full-width-iframe"
            src="{% if default_map == 'seq' %}{% static 'map_seq.html' %}{% else %}{% static 'map_pcr.html' %}{% endif %}?v={{ asset_version }}"></iframe>
    </div>
    </main>
</body>

</html>
